name: PR Governance

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-policy-checks:
    name: Validate PR Policy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Make check script executable
        run: chmod +x scripts/check-pr-policy.sh
      
      - name: Run PR policy validation
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: ./scripts/check-pr-policy.sh
      
      - name: Comment on PR if checks fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `## ❌ PR Policy Check Failed
            
            Your PR does not meet the required policy checks. Please review:
            
            ### Requirements
            1. **Conventional Commit Title**: PR title must follow the format:
               - \`type(scope)?: description\`
               - Types: \`feat\`, \`fix\`, \`docs\`, \`style\`, \`refactor\`, \`test\`, \`chore\`
               - Example: \`feat(radio): add TX-500 CAT control\`
            
            2. **Issue Reference**: PR body must contain an issue reference:
               - \`Closes #123\`, \`Fixes #123\`, \`Related to #123\`, or \`Issue #123\`
               - Or explicitly opt-out: \`No issue reference needed: <reason>\`
            
            ### Quick Fix
            Edit your PR title and/or description to meet these requirements.
            
            See [CONTRIBUTING.md](CONTRIBUTING.md) for more details.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
