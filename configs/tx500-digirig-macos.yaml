# CleanComms Configuration for TX-500 with DigiRig on macOS
# This is the first vertical slice configuration for development.

server:
  http_addr: "127.0.0.1:8080"

rigctld:
  host: "127.0.0.1"
  port: 4532
  model_id: 2054  # TX-500 Hamlib model ID
  serial_port: "/dev/cu.usbserial-xxx"  # Override per setup
  baud_rate: 9600  # TX-500 fixed rate per Hamlib tx500.c

fldigi:
  xmlrpc_addr: "http://127.0.0.1:7362"
  default_mode: "PSK31"

safety:
  ptt_timeout_seconds: 60  # Watchdog timeout

# Feature flags for V1 modules and V2 gates
# V1 modules (logging, lookup, map, solar) default to enabled
# V2 signal-id gate defaults to disabled
feature_flags:
  logging_enabled: true
  lookup_enabled: true
  map_enabled: true
  solar_enabled: true
  signal_id_v2_enabled: false

# VPN-only remote access (fail-closed)
# Security provided by VPN; no TLS/auth at app layer.
# bind must be explicit IP - never use 0.0.0.0
remote:
  enabled: false
  bind: ""  # e.g., "10.8.0.2:8080" for VPN access

# Policy configuration (fail-closed defaults)
# All V2 and remote features must be EXPLICITLY enabled.
# Default state is DISABLED for security.
policy:
  # AI/ML features (V2 signal classification, etc.)
  # Set to true ONLY if you understand the implications.
  ai_enabled: false

  # Remote access via VPN
  # Set to true ONLY if you have VPN properly configured.
  remote_access_enabled: false

  # Auto-apply AI suggestions - ALWAYS false for safety.
  # This is a kill switch; suggestions must be manually reviewed.
  auto_apply_suggestions: false
